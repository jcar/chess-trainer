name: e2e (Playwright)

# Acceptance tests for the kids module. Runs on every push and PR and reports
# status independently — it deliberately does NOT gate the Deploy workflow.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Don't pile up runs on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The Playwright webServer builds the static export (basePath empty, so
      # routes are served at the root) and serves it on :4321, then the suite runs.
      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
